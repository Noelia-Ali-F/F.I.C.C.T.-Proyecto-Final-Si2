    get:
      operationId: auth_perfil_retrieve
      description: Obtener y actualizar perfil del usuario autenticado.
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioPerfil'
          description: ''
    patch:
      operationId: auth_perfil_partial_update
