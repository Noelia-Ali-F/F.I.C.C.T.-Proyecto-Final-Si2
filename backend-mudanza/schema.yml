              $ref: '#/components/schemas/PatchedUsuarioPerfilRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUsuarioPerfilRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUsuarioPerfilRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
